<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#F7F3ED;--sw:#FFFEFB;--wb:#3D2B1A;--cara:#BF7235;--lc:#E8B87A;--db:#1A0E05;--mu:#8C7060;--bo:#E0D0BC;--ok:#3E7D52;--bad:#B83030;--warn:#B87020;--info:#2A5F9E;--sb:230px;--hd:56px}

.brand-logo{display:inline-block;vertical-align:middle;width:1.4em;height:1.4em;margin-right:.15em;object-fit:contain;flex-shrink:0}
.login-logo{display:block;margin:0 auto .8rem;width:84px;height:84px;object-fit:contain}
html,body{overflow-x:hidden;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--db);font-size:14px;line-height:1.5}
input,select,textarea{font-family:inherit;font-size:16px}
button{font-family:inherit}

.login-wrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--wb);padding:1rem}
.login-card{background:var(--sw);border-radius:20px;padding:2rem 1.75rem;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.login-badge{display:inline-block;background:#F5EDE0;border:1px solid var(--bo);border-radius:50px;padding:4px 12px;font-size:.72rem;color:var(--mu);margin-bottom:1rem}
.login-title{font-size:1.5rem;font-weight:700;color:var(--wb);margin-bottom:.25rem}
.login-sub{color:var(--mu);font-size:.85rem;margin-bottom:1.5rem}
.form-label{display:block;font-size:.72rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-ctrl{width:100%;padding:11px 14px;border:1.5px solid var(--bo);border-radius:8px;font-size:15px;background:var(--bg);color:var(--db);outline:none;appearance:none;-webkit-appearance:none}
.form-ctrl:focus{border-color:var(--cara)}
.form-group{margin-bottom:.9rem}
.login-btn{width:100%;background:var(--wb);color:#fff;border:none;padding:13px;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:.25rem}
.login-btn:active{background:var(--cara)}
.login-hint{margin-top:1.25rem;background:#faf3e8;border:1px solid var(--bo);border-radius:8px;padding:10px 14px;font-size:.76rem;color:var(--mu);line-height:1.9}
.login-hint strong{color:var(--wb)}
.login-err{color:var(--bad);font-size:.82rem;min-height:18px;margin-bottom:.5rem}

.app{display:none;height:100vh;height:100dvh;flex-direction:column}
.topbar{height:var(--hd);background:var(--wb);display:flex;align-items:center;padding:0 1rem;gap:.6rem;flex-shrink:0;position:relative;z-index:10}
.menu-toggle{display:none;background:none;border:none;color:var(--lc);font-size:1.4rem;cursor:pointer;padding:6px 8px;margin-left:-6px;border-radius:6px}
.menu-toggle:active{background:rgba(232,184,122,.1)}
.tb-logo{font-size:.95rem;font-weight:700;color:var(--lc);white-space:nowrap}
.tb-store{background:rgba(232,184,122,.12);border:1px solid rgba(232,184,122,.2);color:var(--lc);border-radius:50px;padding:4px 11px;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.tb-role{font-size:.7rem;color:rgba(232,184,122,.5)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.6rem}
.tb-alert{position:relative;cursor:pointer;padding:4px;color:rgba(232,184,122,.6);font-size:1.1rem}
.tb-alert:active{color:var(--lc)}
.tb-dot{position:absolute;top:0;right:0;width:8px;height:8px;background:var(--bad);border-radius:50%;border:1.5px solid var(--wb)}
.tb-avatar{width:30px;height:30px;border-radius:50%;background:var(--cara);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0}
.logout-link{font-size:.75rem;color:rgba(232,184,122,.5);cursor:pointer;border:none;background:none;padding:4px 6px;white-space:nowrap}
.logout-link:active{color:rgba(232,184,122,.9)}

.app-body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;transition:opacity .22s}
.sidebar-overlay.show{display:block;opacity:1}
.sidebar{width:var(--sb);background:var(--wb);overflow-y:auto;padding:.75rem .55rem;flex-shrink:0;transition:transform .25s}
.nav-section{margin-bottom:1.1rem}
.nav-section-title{font-size:.66rem;color:rgba(232,184,122,.35);text-transform:uppercase;letter-spacing:.8px;padding:0 .6rem;margin-bottom:.35rem;font-weight:700}
.nav-it{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;color:rgba(232,184,122,.55);cursor:pointer;font-size:.86rem;user-select:none}
.nav-it:active{background:rgba(232,184,122,.12)}
.nav-it:hover{background:rgba(232,184,122,.08);color:var(--lc)}
.nav-it.act{background:var(--cara);color:#fff}
.nav-ic{font-size:.95rem;width:18px;text-align:center;flex-shrink:0}
.nbadge{background:var(--bad);color:#fff;font-size:.62rem;padding:1px 5px;border-radius:9px;margin-left:auto;font-weight:700}

.main{flex:1;overflow-y:auto;background:var(--bg);-webkit-overflow-scrolling:touch}
.page-wrap{padding:1.4rem 1.6rem;max-width:1600px;margin:0 auto}

.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;gap:.75rem;flex-wrap:wrap}
.page-title{font-size:1.25rem;font-weight:700;color:var(--wb);line-height:1.25}
.page-sub{font-size:.78rem;color:var(--mu);margin-top:3px}
.page-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}

.store-tabs{display:flex;gap:5px;margin-bottom:1.15rem;flex-wrap:wrap;overflow-x:auto;padding-bottom:2px}
.store-tab{padding:6px 13px;border-radius:50px;border:1.5px solid var(--bo);background:var(--sw);color:var(--mu);font-size:.78rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
.store-tab:active{transform:scale(.97)}
.store-tab.act{background:var(--cara);border-color:var(--cara);color:#fff;font-weight:600}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem;margin-bottom:1.3rem}
.stat-card{background:var(--sw);border-radius:12px;padding:1rem;border:1px solid var(--bo)}
.sc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.45rem}
.sc-icon{font-size:1.15rem;opacity:.85}
.sc-tag{font-size:.66rem;padding:2px 7px;border-radius:9px;font-weight:700}
.sc-tag-up{background:#edf7ee;color:var(--ok)}
.sc-tag-down{background:#fef0f0;color:var(--bad)}
.sc-tag-neutral{background:#f5f0e8;color:var(--mu)}
.sc-val{font-size:1.5rem;font-weight:700;color:var(--wb);line-height:1.15;word-break:break-all}
.sc-label{font-size:.7rem;color:var(--mu);margin-top:4px}

.tcard{background:var(--sw);border-radius:12px;border:1px solid var(--bo);overflow:hidden;margin-bottom:1.2rem}
.tcard-hd{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.1rem;border-bottom:1px solid var(--bo);gap:.5rem;flex-wrap:wrap}
.tcard-hd h3{font-size:.88rem;font-weight:600;color:var(--wb);display:flex;align-items:center;gap:6px}
.tcard-tools{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.search-in{padding:7px 12px;border:1.5px solid var(--bo);border-radius:50px;font-size:.82rem;outline:none;background:var(--bg);width:170px;max-width:100%}
.search-in:focus{border-color:var(--cara)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:max-content}
th{background:var(--bg);font-size:.68rem;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;padding:8px 1rem;text-align:left;border-bottom:1px solid var(--bo);white-space:nowrap;font-weight:700}
td{padding:9px 1rem;font-size:.85rem;border-bottom:1px solid rgba(224,208,188,.3);vertical-align:middle}
tr:last-child td{border-bottom:none}
.low-row td:first-child{border-left:3px solid var(--bad)}
.expiry-row td:first-child{border-left:3px solid var(--warn)}

.badge{display:inline-block;font-size:.68rem;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-ok{background:#edf7ee;color:var(--ok)}
.b-low{background:#fef0f0;color:var(--bad)}
.b-warn{background:#fef8ec;color:var(--warn)}
.b-pending{background:#fff5e0;color:var(--warn)}
.b-done{background:#edf7ee;color:var(--ok)}
.b-info{background:#ebf2fb;color:var(--info)}
.b-gray{background:#f5efe8;color:var(--mu)}
.b-purple{background:#f1ebf7;color:#6a4a8a}

.btn{padding:8px 16px;border-radius:50px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--cara);color:#fff}
.btn-primary:hover{background:var(--wb)}
.btn-ghost{background:transparent;border:1.5px solid var(--bo);color:var(--mu)}
.btn-danger{background:var(--bad);color:#fff}
.btn-ok{background:var(--ok);color:#fff}
.btn-info{background:var(--info);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-sm{padding:6px 12px;font-size:.76rem}
.btn-xs{padding:3px 9px;font-size:.7rem}

.modal-ov{position:fixed;inset:0;background:rgba(26,14,5,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:.75rem}
.modal-ov.open{display:flex}
.modal-box{background:var(--sw);border-radius:16px;padding:1.5rem;width:540px;max-width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-box.wide{width:680px}
.modal-box h2{font-size:1.05rem;font-weight:700;color:var(--wb);margin-bottom:1.1rem;padding-bottom:.7rem;border-bottom:1px solid var(--bo)}
.form-row{margin-bottom:.8rem}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.form-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}
.modal-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1.2rem;padding-top:.9rem;border-top:1px solid var(--bo);flex-wrap:wrap}
textarea.form-ctrl{resize:vertical;min-height:65px;font-size:14px}

.prog-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px;min-width:60px}
.prog-fill{height:100%;border-radius:3px}
.prog-ok{background:var(--ok)}
.prog-warn{background:var(--warn)}
.prog-bad{background:var(--bad)}

.divider{border:none;border-top:1px solid var(--bo);margin:1rem 0}
.empty-state{text-align:center;padding:2.2rem 1rem;color:var(--mu)}
.empty-state .ei{font-size:2rem;margin-bottom:.6rem;opacity:.3}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--wb);color:#fff;padding:9px 18px;border-radius:50px;font-size:.82rem;z-index:999;opacity:0;transition:all .26s;pointer-events:none;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.tag{display:inline-block;font-size:.68rem;padding:1px 7px;border-radius:10px;background:var(--bg);border:1px solid var(--bo);color:var(--mu)}
.del-btn{background:none;border:none;color:var(--bad);font-size:1.05rem;cursor:pointer;padding:4px 6px;opacity:.65}
.del-btn:active{opacity:1}

.cost-wrap{display:grid;grid-template-columns:1.4fr 1fr;gap:1.1rem;align-items:start}
.cost-panel{background:var(--sw);border:1px solid var(--bo);border-radius:12px;padding:1.25rem}
.cost-panel h3{font-size:.88rem;font-weight:600;color:var(--wb);margin-bottom:.9rem;border-bottom:1px solid var(--bo);padding-bottom:.55rem}
.ing-hdr{display:grid;grid-template-columns:2fr .9fr .9fr 1fr auto;gap:.35rem;font-size:.66rem;color:var(--mu);font-weight:700;text-transform:uppercase;margin-bottom:.35rem;padding:0 2px}
.ing-row-g{display:grid;grid-template-columns:2fr .9fr .9fr 1fr auto;gap:.35rem;align-items:center;margin-bottom:.35rem}
.ing-row-g input,.ing-row-g select{padding:6px 8px;border:1.5px solid var(--bo);border-radius:6px;font-size:13px;background:var(--bg);outline:none;width:100%}
.cost-preview-cell{font-size:.78rem;color:var(--mu);text-align:right;font-weight:600}
.cost-summary-box{background:linear-gradient(135deg,#fdf5e8,#faf0dc);border:1px solid var(--lc);border-radius:12px;padding:1.15rem;margin-top:.9rem}
.cs-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.cs-val{font-size:1.18rem;font-weight:700;color:var(--wb)}
.cs-label{font-size:.68rem;color:var(--mu);margin-top:2px}
.recipe-saved-list{display:flex;flex-direction:column;gap:.5rem;max-height:480px;overflow-y:auto}
.recipe-saved-item{background:var(--bg);border:1px solid var(--bo);border-radius:8px;padding:9px 12px;cursor:pointer}
.recipe-saved-item:hover{border-color:var(--cara);background:var(--sw)}
.rsi-name{font-weight:600;font-size:.86rem;color:var(--wb)}
.rsi-cost{font-size:.8rem;color:var(--cara);font-weight:600;margin-top:2px}
.rsi-meta{font-size:.72rem;color:var(--mu);margin-top:2px}

.tf-layout{display:grid;grid-template-columns:340px 1fr;gap:1.1rem;align-items:start}
.tf-form-card{background:var(--sw);border:1px solid var(--bo);border-radius:12px;padding:1.25rem}
.tf-form-card h3{font-size:.88rem;font-weight:600;color:var(--wb);margin-bottom:.9rem}
.tf-item-hdr{display:grid;grid-template-columns:2fr 1fr .8fr auto;gap:.35rem;font-size:.66rem;color:var(--mu);font-weight:700;text-transform:uppercase;margin-bottom:.3rem}
.tf-item-row{display:grid;grid-template-columns:2fr 1fr .8fr auto;gap:.35rem;align-items:center;margin-bottom:.35rem}
.tf-item-row select,.tf-item-row input{padding:6px 8px;border:1.5px solid var(--bo);border-radius:6px;font-size:13px;background:var(--bg);outline:none;width:100%}
.tf-record{border-bottom:1px solid rgba(224,208,188,.3);padding:10px 1.1rem;display:flex;gap:.65rem;align-items:flex-start;flex-wrap:wrap}
.tf-record:last-child{border-bottom:none}
.tf-record-body{flex:1;min-width:200px}
.tf-record-title{font-size:.85rem;font-weight:600;color:var(--db);margin-bottom:3px}
.tf-record-meta{font-size:.74rem;color:var(--mu)}

.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem}
.chart-card{background:var(--sw);border:1px solid var(--bo);border-radius:12px;padding:1.1rem}
.chart-card h3{font-size:.85rem;font-weight:600;color:var(--wb);margin-bottom:.85rem}
.chart-wrap{position:relative;height:200px}
.chart-full{grid-column:span 2}
.akpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1rem}
.akpi{background:var(--sw);border:1px solid var(--bo);border-radius:8px;padding:.85rem;text-align:center}
.akpi-val{font-size:1.3rem;font-weight:700;color:var(--cara)}
.akpi-label{font-size:.7rem;color:var(--mu);margin-top:3px}

.po-card{background:var(--sw);border:1px solid var(--bo);border-radius:12px;overflow:hidden;margin-bottom:1.1rem}
.po-row{border-bottom:1px solid rgba(224,208,188,.3);padding:10px 1.1rem;display:flex;gap:.65rem;align-items:flex-start;flex-wrap:wrap}
.po-row:last-child{border-bottom:none}
.po-body{flex:1;min-width:200px}
.po-title{font-size:.85rem;font-weight:600;color:var(--db);margin-bottom:3px}
.po-meta{font-size:.74rem;color:var(--mu)}

.supplier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.1rem}
.supplier-card{background:var(--sw);border:1px solid var(--bo);border-radius:12px;padding:1rem}
.sup-avatar{width:38px;height:38px;border-radius:50%;background:var(--cara);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff}
.sup-name{font-weight:600;font-size:.9rem;color:var(--wb)}
.sup-cat{font-size:.74rem;color:var(--mu);margin-top:2px}
.sup-contact{font-size:.74rem;color:var(--mu);margin-top:.55rem;line-height:1.75}

.order-card{background:var(--sw);border:1px solid var(--bo);border-radius:12px;padding:1rem;margin-bottom:.7rem;display:grid;grid-template-columns:auto 1fr auto;gap:.85rem;align-items:start}
.order-icon{width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,#fff5e0,#fce5b8);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.order-body{min-width:0}
.order-title{font-weight:600;font-size:.92rem;color:var(--wb);margin-bottom:3px}
.order-meta{font-size:.76rem;color:var(--mu);line-height:1.6}
.order-meta strong{color:var(--db);font-weight:600}
.order-actions{display:flex;flex-direction:column;align-items:flex-end;gap:5px}

.ai-fab{position:fixed;bottom:1.25rem;right:1.25rem;z-index:200}
.ai-toggle{width:50px;height:50px;background:var(--cara);border-radius:50%;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(191,114,53,.45);display:flex;align-items:center;justify-content:center;font-size:1.35rem;color:#fff}
.ai-toggle:active{transform:scale(.94)}
.ai-window{position:fixed;bottom:4.5rem;right:1.25rem;width:340px;height:480px;max-height:75vh;background:var(--wb);border-radius:16px;box-shadow:0 16px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;z-index:200;overflow:hidden;transform:scale(.96) translateY(8px);opacity:0;pointer-events:none;transition:all .2s}
.ai-window.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}
.ai-hd{padding:.85rem 1rem .7rem;border-bottom:1px solid rgba(232,184,122,.15);display:flex;align-items:center;justify-content:space-between}
.ai-hd-left h4{font-size:.9rem;font-weight:600;color:var(--lc)}
.ai-hd-left p{font-size:.7rem;color:rgba(232,184,122,.5);margin-top:1px}
.ai-close{background:none;border:none;color:rgba(232,184,122,.4);font-size:1.05rem;cursor:pointer;padding:4px 8px}
.ai-messages{flex:1;overflow-y:auto;padding:.7rem;display:flex;flex-direction:column;gap:7px}
.ai-msg{max-width:88%;padding:9px 12px;border-radius:12px;font-size:.83rem;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.ai-msg.user{align-self:flex-end;background:var(--cara);color:#fff;border-bottom-right-radius:3px}
.ai-msg.bot{align-self:flex-start;background:rgba(255,255,255,.1);color:var(--lc);border-bottom-left-radius:3px}
.ai-msg.loading{opacity:.6;font-style:italic}
.ai-quick{padding:0 .7rem .35rem;display:flex;gap:4px;flex-wrap:wrap}
.ai-qbtn{background:rgba(232,184,122,.1);border:1px solid rgba(232,184,122,.2);color:var(--lc);font-size:.7rem;padding:4px 8px;border-radius:50px;cursor:pointer}
.ai-input-row{display:flex;gap:5px;padding:.7rem;border-top:1px solid rgba(232,184,122,.12)}
#ai-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(232,184,122,.2);color:var(--lc);border-radius:50px;padding:8px 12px;font-size:14px;outline:none}
#ai-input::placeholder{color:rgba(232,184,122,.35)}
#ai-send{background:var(--cara);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:.95rem;flex-shrink:0}

@media (max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}.supplier-grid{grid-template-columns:repeat(2,1fr)}.cost-wrap{grid-template-columns:1fr}.tf-layout{grid-template-columns:1fr}}
@media (max-width:768px){
  :root{--hd:52px}
  .page-wrap{padding:1rem .9rem}
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  .sidebar{position:fixed;left:0;top:var(--hd);bottom:0;z-index:60;transform:translateX(-100%);box-shadow:6px 0 24px rgba(0,0,0,.2);width:240px}
  .sidebar.open{transform:translateX(0)}
  .tb-logo{font-size:.88rem}.tb-store{font-size:.72rem;max-width:120px}.tb-role{display:none}
  .logout-link{font-size:.7rem;padding:5px 7px}
  .tb-avatar{width:28px;height:28px;font-size:.7rem}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:.6rem}
  .stat-card{padding:.85rem}.sc-val{font-size:1.2rem}
  .two-col,.three-col,.analytics-grid{grid-template-columns:1fr}
  .chart-full{grid-column:span 1}
  .form-2,.form-3{grid-template-columns:1fr}
  .modal-box{padding:1.25rem;border-radius:12px}
  .supplier-grid{grid-template-columns:1fr}
  .page-hdr{flex-direction:column;align-items:stretch}
  .page-actions{justify-content:flex-start}
  .page-title{font-size:1.1rem}
  .ai-window{width:calc(100vw - 1rem);right:.5rem;height:70vh}
  .order-card{grid-template-columns:auto 1fr;gap:.6rem}
  .order-actions{grid-column:span 2;flex-direction:row;justify-content:space-between;flex-wrap:wrap}
  .ing-hdr,.ing-row-g{grid-template-columns:1.8fr .8fr .7fr .9fr auto}
  .ing-row-g input,.ing-row-g select{padding:5px 6px;font-size:12px}
  .tf-item-hdr,.tf-item-row{grid-template-columns:1.6fr .9fr .7fr auto}
  th,td{padding:7px 9px;font-size:.78rem}
  .search-in{width:100%}
}
@media (max-width:480px){
  .page-wrap{padding:.85rem .7rem}
  .stat-card{padding:.7rem .8rem}
  .sc-val{font-size:1.1rem}
  .btn{padding:7px 13px;font-size:.78rem}
  .btn-sm{padding:5px 10px;font-size:.72rem}
  th,td{padding:6px 8px;font-size:.74rem}
  .ai-window{width:calc(100vw - .75rem);right:.375rem}
}
.row-chk{width:16px;height:16px;cursor:pointer;accent-color:var(--cara);vertical-align:middle}
.card-chk{position:absolute;top:10px;left:10px;width:18px;height:18px;cursor:pointer;accent-color:var(--cara);z-index:2}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bo);border-radius:3px}
.batch-bar{position:sticky;top:0;z-index:30;background:var(--wb);color:#fff;padding:.7rem 1rem;margin:0 0 1rem;border-radius:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 14px rgba(0,0,0,.18);flex-wrap:wrap;gap:.5rem;font-size:.86rem}
.batch-bar-count{font-weight:600}
.batch-bar-count .num{color:var(--lc);font-size:1rem;margin:0 3px}
.batch-bar-actions{display:flex;gap:6px;flex-wrap:wrap}
.row-chk{cursor:pointer;width:16px;height:16px;accent-color:var(--cara);vertical-align:middle}
.chk-col{width:36px;text-align:center}
.card-chk{position:absolute;top:8px;left:8px;width:18px;height:18px;accent-color:var(--cara);cursor:pointer;z-index:2}
.has-chk{position:relative;padding-left:34px!important}
</style>

// 云端拉取
async function cloudPull(){
  if(!_cloudOK)return null;
  try{
    const {data,error}=await _sb.from('bakery_data').select('payload,updated_at').eq('id','main').single();
    if(error){console.warn('cloudPull error',error);return null}
    return data;
  }catch(e){console.warn('cloudPull exception',e);return null}
}
// 云端推送(防抖,2秒内只推一次)
async function cloudPushNow(){
  if(!_cloudOK||!S.db||_syncing)return false;
  _syncing=true;
  try{
    const {error}=await _sb.from('bakery_data').upsert({id:'main',payload:S.db,updated_at:new Date().toISOString()});
    _syncing=false;
    if(error){console.warn('cloudPush error',error);updateCloudIndicator('err');return false}
    _lastSync=Date.now();updateCloudIndicator('ok');return true;
  }catch(e){_syncing=false;console.warn('cloudPush exception',e);updateCloudIndicator('err');return false}
}
function cloudPush(){if(!_cloudOK)return;clearTimeout(_syncTimer);updateCloudIndicator('pending');_syncTimer=setTimeout(cloudPushNow,1500)}

    for(let d=9;d>=1;d--){const dt=daysAgo(d);const todaySales=db.sales[sid].filter(s=>s.date===dt);const expected=todaySales.reduce((s,x)=>s+x.qty*x.price,0);const cash=Math.round(expected*0.3);const card=Math.round(expected*0.5);const mobile=Math.round(expected*0.2);db.dailyClose[sid].push({id:uid(),date:dt,expected,cash,card,mobile,expense:rnd(50,300),variance:(cash+card+mobile)-expected,note:'',closedBy:st(sid).name})}
  });

  [{from:'bj1',to:'bj2',items:[{name:'无盐黄油',qty:500,unit:'g'}],status:'completed',d:12},{from:'sh1',to:'bj1',items:[{name:'奶油奶酪',qty:600,unit:'g'}],status:'pending',d:2},{from:'gz1',to:'sh1',items:[{name:'蛋糕盒',qty:50,unit:'个'}],status:'pending',d:1}].forEach(t=>db.transfers.push({id:uid(),from:t.from,to:t.to,items:t.items,status:t.status,date:daysAgo(t.d),note:''}));

async function tryAutoLogin(){
  try{
    const sessRaw=sessionStorage.getItem('bk_session');if(!sessRaw)return false;
    const sess=JSON.parse(sessRaw);
    if(!sess||!sess.userId)return false;
    // 检查闲置时间
    if(sess.lastActive&&Date.now()-sess.lastActive>IDLE_TIMEOUT_MS){
      sessionStorage.removeItem('bk_session');return false;
    }
    // 先尝试从云端拉数据(确保 STORES 是最新的)
    if(_cloudOK){
      const cloud=await cloudPull();
      if(cloud&&cloud.payload&&cloud.payload.stores&&cloud.payload.stores.length){
        STORES=cloud.payload.stores;refreshShopIds();
        localStorage.setItem('bk_db',JSON.stringify(cloud.payload));
      }
    }
    const store=STORES.find(s=>s.id===sess.userId&&s.active!==false);
    if(!store){sessionStorage.removeItem('bk_session');return false}
    // 更新最后活跃时间
    sess.lastActive=Date.now();sessionStorage.setItem('bk_session',JSON.stringify(sess));
    enterApp(store);return true;
  }catch(e){console.warn('auto-login failed',e);return false}
}

function renderDash(){
  const ids=sids();const today=todayStr();const in7=addDays(7);
  let totalVal=0,lowCount=0,expWarn=0,todaySales=0,todayOrders=0,todayLoss=0,prodPending=0,custOrdPending=0;
  ids.forEach(sid=>{
    inv(sid).forEach(it=>{totalVal+=it.qty*it.uc;if(it.qty<it.min)lowCount++;if(it.expiry&&it.expiry<=in7)expWarn++});
    (S.db.sales[sid]||[]).filter(s=>s.date===today).forEach(s=>{todaySales+=s.qty*s.price;todayOrders+=s.qty});
    (S.db.losses[sid]||[]).filter(l=>l.date===today).forEach(l=>todayLoss+=l.loss);
    (S.db.production[sid]||[]).filter(p=>p.date===today&&p.status!=='已完成'&&p.status!=='已取消').forEach(()=>prodPending++);
    (S.db.orders[sid]||[]).filter(o=>o.status==='待确认').forEach(()=>custOrdPending++);
  });
  const pendingTf=S.db.transfers.filter(t=>t.status==='pending'&&(S.user.isAdmin||t.to===S.user.id||t.from===S.user.id)).length;
  const todayMap={};
  ids.forEach(sid=>(S.db.sales[sid]||[]).filter(s=>s.date===today).forEach(s=>{todayMap[s.productName]=(todayMap[s.productName]||0)+s.qty*s.price}));
  const topToday=Object.entries(todayMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const alerts=[];
  ids.forEach(sid=>inv(sid).forEach(it=>{
    if(it.qty<it.min)alerts.push({msg:`${st(sid).name}【${it.name}】库存不足（${num(it.qty)}/${num(it.min)}${it.unit}）`,level:'bad'});
    if(it.expiry&&it.expiry<=in7)alerts.push({msg:`${st(sid).name}【${it.name}】将于 ${it.expiry} 过期`,level:'warn'});
  }));
  const upcomingOrders=[];
  ids.forEach(sid=>(S.db.orders[sid]||[]).filter(o=>['已确认','制作中','待取货'].includes(o.status)&&o.pickupDate>=isoDate()).slice(0,5).forEach(o=>upcomingOrders.push({...o,storeId:sid})));
  upcomingOrders.sort((a,b)=>a.pickupDate.localeCompare(b.pickupDate));

function renderInv(){
  const sid=vsid();const items=inv(sid).filter(it=>!invSearch||it.name.includes(invSearch)||it.cat.includes(invSearch));
  const totalVal=items.reduce((s,it)=>s+it.qty*it.uc,0);
  const lowItems=items.filter(it=>it.qty<it.min);const in7=addDays(7);
  const rows=items.map(it=>{
    const pct100=Math.min(100,Math.round(it.qty/Math.max(it.min,1)*100));
    const low=it.qty<it.min;const expWarn=it.expiry&&it.expiry<=in7;
    const barClass=low?'prog-bad':pct100>150?'prog-ok':'prog-warn';
    const bClass=low?'b-low':pct100>150?'b-ok':'b-warn';
    const sup=S.db.suppliers.find(s=>s.id===it.supplierId);
    return`<tr class="${low?'low-row':expWarn?'expiry-row':''}"><td><input type="checkbox" class="row-chk" ${S.sel.has(it.id)?'checked':''} onclick="toggleSel('${it.id}',event)"></td><td><strong>${it.name}</strong>${expWarn?` <span class="badge b-warn" style="font-size:.62rem">⏰</span>`:''}</td><td><span class="tag">${it.cat}</span></td><td>${num(it.qty)}<small style="color:var(--mu)"> ${it.unit}</small><div class="prog-bar"><div class="prog-fill ${barClass}" style="width:${pct100}%"></div></div></td><td>${num(it.min)} ${it.unit}</td><td><span class="badge ${bClass}">${low?'不足':pct100>150?'充足':'偏低'}</span></td><td>${it.expiry||'—'}</td><td>${money(it.uc)}</td><td style="font-weight:600">${money(it.qty*it.uc)}</td><td style="color:var(--mu);font-size:.76rem">${sup?.name||'—'}</td><td><div style="display:flex;gap:3px"><button class="btn btn-ghost btn-xs" onclick="showEditItem('${sid}','${it.id}')">编辑</button><button class="btn btn-ok btn-xs" onclick="quickRestock('${sid}','${it.id}')">补</button><button class="btn btn-danger btn-xs" onclick="delItem('${sid}','${it.id}')">删</button></div></td></tr>`;
  }).join('');
  return`
  <div class="page-hdr"><div><div class="page-title">📦 库存管理</div><div class="page-sub">${S.user.isAdmin?'切换查看各门店':S.user.name+'・库存清单'}</div></div>
    <div class="page-actions"><button class="btn btn-ghost btn-sm" onclick="showStocktake('${sid}')">📋 盘点</button><button class="btn btn-primary btn-sm" onclick="showAddItem('${sid}')">＋ 新增</button></div>
  </div>${adminTabs()}
  <div class="stats-grid">
    <div class="stat-card"><div class="sc-val">${items.length}</div><div class="sc-label">商品品类</div></div>
    <div class="stat-card"><div class="sc-val">${moneyK(totalVal)}</div><div class="sc-label">库存总价值</div></div>
    <div class="stat-card"><div class="sc-val" style="color:${lowItems.length?'var(--bad)':'var(--ok)'}">${lowItems.length}</div><div class="sc-label">低库存</div></div>
    <div class="stat-card"><div class="sc-val" style="color:${items.filter(i=>i.expiry&&i.expiry<=in7).length?'var(--warn)':'var(--ok)'}">${items.filter(i=>i.expiry&&i.expiry<=in7).length}</div><div class="sc-label">7天内到期</div></div>
  </div>
  ${selBarHTML('inventory',items.length)}
  <div class="tcard"><div class="tcard-hd"><h3>库存清单</h3><div class="tcard-tools"><input class="search-in" placeholder="搜索…" oninput="invSearch=this.value;navigate('inventory')"></div></div>
    <div class="table-wrap"><table><thead><tr><th style="width:36px"><input type="checkbox" class="row-chk" ${items.length&&items.every(i=>S.sel.has(i.id))?'checked':''} onclick="toggleAllSel(${JSON.stringify(items.map(i=>i.id))},this.checked)"></th><th>商品名</th><th>分类</th><th>库存</th><th>最低</th><th>状态</th><th>到期日</th><th>单价</th><th>总价值</th><th>供应商</th><th>操作</th></tr></thead><tbody>${rows||'<tr><td colspan="11"><div class="empty-state"><div class="ei">📦</div>暂无库存</div></td></tr>'}</tbody></table></div>
  </div>`;
}

function saveNewItem(sid){const name=v('f-name');if(!name){toast('请输入名称');return}inv(sid).push({id:uid(),name,cat:v('f-cat'),unit:v('f-unit'),qty:+v('f-qty')||0,min:+v('f-min')||0,uc:+v('f-uc')||0,supplierId:v('f-sup'),expiry:v('f-exp'),updated:todayStr()});save();closeModal();toast('✅ 已添加');navigate('inventory')}

function saveEditItem(sid,iid){const it=inv(sid).find(i=>i.id===iid);if(!it)return;Object.assign(it,{name:v('f-name'),cat:v('f-cat'),unit:v('f-unit'),qty:+v('f-qty'),min:+v('f-min'),uc:+v('f-uc'),supplierId:v('f-sup'),expiry:v('f-exp'),updated:todayStr()});save();closeModal();toast('✅ 已更新');navigate('inventory')}
function quickRestock(sid,iid){
  const it=inv(sid).find(i=>i.id===iid);if(!it)return;
  openModal(`<h2>📦 快速补货：${it.name}</h2>
    <div class="form-row"><label class="form-label">当前库存</label><input class="form-ctrl" value="${num(it.qty)} ${it.unit}" readonly style="color:var(--mu)"></div>
    <div class="form-row"><label class="form-label">建议补货量</label><input class="form-ctrl" value="${Math.max(0,it.min*2-it.qty)} ${it.unit}" readonly style="color:var(--cara);font-weight:600"></div>

    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-ok" onclick="doRestock('${sid}','${iid}')">确认</button></div>`);

function doRestock(sid,iid){const it=inv(sid).find(i=>i.id===iid);if(!it)return;const add=+v('f-restock')||0;if(add<=0){toast('请输入数量');return}it.qty+=add;it.updated=todayStr();save();closeModal();toast(`✅ 补货成功`);navigate('inventory')}
function delItem(sid,iid){if(!confirm('确认删除？'))return;S.db.inventory[sid]=inv(sid).filter(i=>i.id!==iid);save();toast('🗑 已删除');navigate('inventory')}
function showStocktake(sid){
  const items=inv(sid);
  openModal(`<h2>📋 库存盘点 · ${st(sid).name}</h2>
    <div style="max-height:60vh;overflow-y:auto"><div class="table-wrap"><table><thead><tr><th>商品</th><th>系统</th><th>实盘</th><th>差异</th></tr></thead><tbody id="stk-body">
    ${items.map(it=>`<tr><td>${it.name}</td><td>${num(it.qty)} ${it.unit}</td><td><input type="number" style="width:90px;padding:5px 8px;border:1.5px solid var(--bo);border-radius:6px" data-id="${it.id}" oninput="updStkDiff('${sid}','${it.id}',this.value)"></td><td class="stk-${it.id}" style="color:var(--mu)">—</td></tr>`).join('')}
    </tbody></table></div></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doStocktake('${sid}')">提交</button></div>`,'wide');
}
function updStkDiff(sid,iid,val){const it=inv(sid).find(i=>i.id===iid);if(!it)return;const cell=document.querySelector('.stk-'+iid);if(!cell)return;if(val===''){cell.textContent='—';cell.style.color='var(--mu)';return}const diff=+val-it.qty;cell.textContent=(diff>=0?'+':'')+diff+' '+it.unit;cell.style.color=diff<0?'var(--bad)':diff>0?'var(--ok)':'var(--mu)'}
function doStocktake(sid){let changed=0;document.querySelectorAll('#stk-body input').forEach(inp=>{const val=+inp.value;if(!isNaN(val)&&inp.value!==''){const it=inv(sid).find(i=>i.id===inp.dataset.id);if(it&&it.qty!==val){it.qty=val;it.updated=todayStr();changed++}}});if(!changed){toast('无变更');closeModal();return}save();closeModal();toast(`✅ 盘点完成，更新 ${changed} 项`);navigate('inventory')}

function prodStatusBadge(s){return{'待生产':'b-pending','生产中':'b-info','已完成':'b-done','已取消':'b-gray'}[s]||'b-gray'}

    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-ok" onclick="doProdComplete('${sid}','${pid}')">确认完成并扣减库存</button></div>`);
  setTimeout(()=>updRecipePreview(sid,pid),80);

function updRecipePreview(sid,pid){
  const p=S.db.production[sid].find(x=>x.id===pid);if(!p)return;
  const product=S.db.products.find(x=>x.id===p.productId);
  if(!product?.recipe?.length)return;
  const actual=+v('f-actual')||0;
  const lines=product.recipe.map(ing=>{
    const need=ing.qty*actual;
    const invIt=inv(sid).find(i=>i.name===ing.name);
    const stock=invIt?invIt.qty:0;const unit=invIt?invIt.unit:'';
    const ok=stock>=need;
    return `<div style="display:flex;justify-content:space-between;padding:1px 0"><span>${ok?'✓':'⚠️'} ${ing.name}</span><span style="color:${ok?'var(--ok)':'var(--bad)'};font-weight:600">需 ${need}${unit} / 库存 ${num(stock)}${unit}</span></div>`;
  }).join('');
  const el=document.getElementById('recipe-preview');if(el)el.innerHTML=lines;
}
function doProdComplete(sid,pid){
  const p=S.db.production[sid].find(x=>x.id===pid);if(!p)return;
  const actual=+v('f-actual')||0;
  p.actual=actual;p.note=v('f-note');p.status='已完成';
  // 联动：按配方扣减原料库存
  const product=S.db.products.find(x=>x.id===p.productId);
  const recipe=product?.recipe||[];
  let deductedCount=0,missing=[],deductedDetail=[];
  recipe.forEach(ing=>{
    const need=ing.qty*actual;
    const invIt=inv(sid).find(i=>i.name===ing.name);
    if(invIt){
      if(invIt.qty<need)missing.push(`${ing.name}（差${(need-invIt.qty).toFixed(1)}${invIt.unit}）`);
      invIt.qty=Math.max(0,invIt.qty-need);
      invIt.updated=todayStr();
      deductedCount++;
      deductedDetail.push(`${ing.name}-${need}${invIt.unit}`);
    }else missing.push(`${ing.name}（库存中无此项）`);
  });
  if(deductedDetail.length)p.consumed=deductedDetail.join('、');
  save();closeModal();
  if(deductedCount>0){
    toast(`✅ 完成${actual}件 · 已扣减${deductedCount}种原料${missing.length?` · ⚠️${missing.length}项不足`:''}`);
  }else if(recipe.length){
    toast(`✅ 完成${actual}件 · 但库存中找不到原料项`);
  }else{
    toast(`✅ 完成${actual}件 · 该产品未设置配方`);
  }
  navigate('production');
}

function updOrderStatus(sid,oid,newStatus){
  const o=S.db.orders[sid]?.find(x=>x.id===oid);if(!o)return;
  const prevStatus=o.status;o.status=newStatus;
  // 联动：订单完成时自动生成销售记录
  if(newStatus==='已完成'&&prevStatus!=='已完成'&&!o.salesLinked){
    const product=S.db.products.find(p=>p.id===o.productId);
    const unitCost=product?product.cost:0;
    const unitPrice=o.qty>0?o.price/o.qty:0;
    S.db.sales[sid]=S.db.sales[sid]||[];
    S.db.sales[sid].push({id:uid(),productId:o.productId,productName:o.productName,qty:o.qty,price:unitPrice,cost:unitCost,date:todayStr(),storeId:sid,fromOrderId:o.id});
    o.salesLinked=true;
    save();toast(`✅ 订单完成 · 已自动生成销售记录 ${money(o.price)}`);navigate('orders');return;
  }
  save();toast(`✅ 已更新为「${newStatus}」`);navigate('orders');
}

function addPORow(){const invOpts=inv(vsid()).map(it=>`<option value="${it.name}|${it.unit}|${it.uc}">${it.name}</option>`).join('');const row=document.createElement('div');row.className='po-item-row';row.style.cssText='display:grid;grid-template-columns:2fr 1fr .9fr 1fr auto;gap:.3rem;margin-bottom:.3rem';row.innerHTML=`<select class="form-ctrl" style="padding:6px 8px;font-size:13px">${invOpts}</select><input class="form-ctrl" type="number" style="padding:6px 8px" placeholder="数量"><input class="form-ctrl" style="padding:6px 8px;color:var(--mu)" placeholder="g" readonly><input class="form-ctrl" type="number" style="padding:6px 8px" placeholder="单价" step="0.001"><button class="del-btn" onclick="this.parentElement.remove()">✕</button>`;document.getElementById('po-rows')?.appendChild(row)}
function savePO(){const sid=v('po-store');const supId=v('po-sup');if(!sid||!supId){toast('请选择');return}const items=[];document.querySelectorAll('.po-item-row').forEach(row=>{const sels=row.querySelectorAll('select,input');const parts=sels[0].value.split('|');const qty=+sels[1].value;const uc=+sels[3].value||+parts[2]||0;if(parts[0]&&qty>0)items.push({name:parts[0],qty,unit:sels[2].value||parts[1]||'g',uc,total:qty*uc})});if(!items.length){toast('请添加商品');return}const sup=S.db.suppliers.find(s=>s.id===supId);S.db.purchases.unshift({id:uid(),storeId:sid,supplierId:supId,supplierName:sup?.name||'—',items,total:items.reduce((s,i)=>s+i.total,0),status:'pending',date:todayStr(),note:v('po-note')});save();closeModal();toast('✅ 已提交');navigate('purchase')}
function receivePO(pid){const po=S.db.purchases.find(p=>p.id===pid);if(!po)return;po.items.forEach(it=>{let invIt=inv(po.storeId).find(i=>i.name===it.name);if(!invIt){invIt={id:uid(),name:it.name,cat:'其他',unit:it.unit,qty:0,min:0,uc:it.uc,updated:''};S.db.inventory[po.storeId].push(invIt)}invIt.qty+=it.qty;invIt.updated=todayStr()});po.status='completed';save();toast('✅ 已入库');navigate('purchase')}

function addTFRow(storeId){const invOpts=inv(storeId).map(it=>`<option value="${it.id}|${it.name}|${it.unit}|${it.qty}">${it.name}（${num(it.qty)}${it.unit}）</option>`).join('');const row=document.createElement('div');row.className='tf-item-row';row.style.cssText='display:grid;grid-template-columns:2fr 1fr .8fr auto;gap:.35rem;align-items:center;margin-bottom:.35rem';row.innerHTML=`<select class="form-ctrl" style="padding:6px 8px;font-size:13px">${invOpts}</select><input type="number" class="form-ctrl" style="padding:6px 8px" placeholder="数量"><input class="form-ctrl" style="padding:6px 8px;color:var(--mu)" placeholder="单位" readonly><button class="del-btn" onclick="this.parentElement.remove()">✕</button>`;document.getElementById('tf-rows')?.appendChild(row)}
function submitTF(){const fromId=document.getElementById('tf-from')?.value;const toId=document.getElementById('tf-to')?.value;if(!fromId||!toId||fromId===toId){toast('请选择不同门店');return}const items=[];document.querySelectorAll('.tf-item-row').forEach(row=>{const sels=row.querySelectorAll('select,input');if(!sels[0])return;const parts=sels[0].value.split('|');const qty=+sels[1].value;if(parts[1]&&qty>0)items.push({itemId:parts[0],name:parts[1],qty,unit:parts[2],maxQty:+parts[3]})});if(!items.length){toast('请选择商品');return}let ok=true;items.forEach(it=>{const invIt=inv(fromId).find(x=>x.id===it.itemId);if(!invIt||invIt.qty<it.qty){toast(`${it.name}库存不足`);ok=false}});if(!ok)return;items.forEach(it=>{const invIt=inv(fromId).find(x=>x.id===it.itemId);if(invIt)invIt.qty-=it.qty});S.db.transfers.unshift({id:uid(),from:fromId,to:toId,items:items.map(i=>({name:i.name,qty:i.qty,unit:i.unit})),status:'pending',date:todayStr(),note:v('tf-note')});save();toast('✅ 已发起');updateBadge();navigate('transfer')}
function tfCard(t,isAdmin,sid){const canAct=(t.to===sid||isAdmin)&&t.status==='pending';return`<div class="tf-record"><div class="tf-record-body"><div class="tf-record-title">${st(t.from)?.name||t.from} → ${st(t.to)?.name||t.to}</div><div class="tf-record-meta">${t.items.map(i=>`${i.name} ${num(i.qty)}${i.unit}`).join(' · ')} · ${t.date}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px"><span class="badge ${{'pending':'b-pending','completed':'b-done','rejected':'b-low'}[t.status]||'b-gray'}">${{'pending':'待处理','completed':'已完成','rejected':'已拒绝'}[t.status]||t.status}</span>${canAct?`<div style="display:flex;gap:3px"><button class="btn btn-ok btn-xs" onclick="receiveTF('${t.id}')">✅</button><button class="btn btn-danger btn-xs" onclick="rejectTF('${t.id}')">✕</button></div>`:''}</div></div>`}
function receiveTF(tid){const t=S.db.transfers.find(x=>x.id===tid);if(!t)return;t.items.forEach(it=>{let invIt=inv(t.to).find(x=>x.name===it.name);if(!invIt){invIt={id:uid(),name:it.name,cat:'其他',unit:it.unit,qty:0,min:0,uc:0,updated:''};(S.db.inventory[t.to]=S.db.inventory[t.to]||[]).push(invIt)}invIt.qty+=it.qty;invIt.updated=todayStr()});t.status='completed';save();toast('✅ 已收货');updateBadge();navigate('transfer')}
function rejectTF(tid){if(!confirm('确认拒绝？库存退回。'))return;const t=S.db.transfers.find(x=>x.id===tid);if(!t)return;t.items.forEach(it=>{const invIt=inv(t.from).find(x=>x.name===it.name);if(invIt)invIt.qty+=it.qty});t.status='rejected';save();toast('已拒绝');updateBadge();navigate('transfer')}

  return`

function initCostRows(){if(S.costRows.length===0){S.costRows=[];for(let i=0;i<3;i++)addCostRow(false)}renderCostRows()}
function addCostRow(render=true){S.costRows.push({name:'',qty:0,unit:'g',uc:0});if(render)renderCostRows()}
function renderCostRows(){
  const items=inv(vsid());
  const opts=items.map(it=>`<option value="${it.name}|${it.unit}|${it.uc}">${it.name}</option>`).join('');
  const c=document.getElementById('cost-rows');if(!c)return;
  c.innerHTML=S.costRows.map((row,i)=>`<div class="ing-row-g"><select onchange="updCostRow(${i},'name',this.value)"><option value="">—</option>${opts}</select><input type="number" value="${row.qty||''}" placeholder="用量" oninput="updCostRow(${i},'qty',+this.value)" step="any"><input value="${row.unit||'g'}" readonly style="color:var(--mu)"><div class="cost-preview-cell" id="cp${i}">—</div><button class="del-btn" onclick="S.costRows.splice(${i},1);renderCostRows()">✕</button></div>`).join('');
  S.costRows.forEach((row,i)=>{const sel=c.querySelectorAll('.ing-row-g select')[i];if(sel&&row.name){const it=items.find(x=>x.name===row.name);if(it)for(let o of sel.options)if(o.value===`${it.name}|${it.unit}|${it.uc}`){o.selected=true;break}}});
  calcCost();
}
function updCostRow(i,f,vv){if(f==='name'){const p=vv.split('|');S.costRows[i].name=p[0];S.costRows[i].unit=p[1]||'g';S.costRows[i].uc=+p[2]||0}else S.costRows[i][f]=vv;calcCost()}
function calcCost(){let total=0;S.costRows.forEach((r,i)=>{const c=(r.qty||0)*(r.uc||0);total+=c;const el=document.getElementById('cp'+i);if(el)el.textContent=c>0?money(c):'—'});const waste=(+document.getElementById('c-waste')?.value||10)/100;const labor=+document.getElementById('c-labor')?.value||25;const serv=S.costServings||8;const markup=S.costMarkup||200;const totalC=total*(1+waste)+labor*1.5;const per=totalC/serv;const price=per*(1+markup/100);const margin=price>0?(price-per)/price*100:0;const el=document.getElementById('cost-summary');if(el)el.innerHTML=`<div class="cs-grid"><div><div class="cs-val">${money(total)}</div><div class="cs-label">食材成本</div></div><div><div class="cs-val">${money(per)}</div><div class="cs-label">单份成本</div></div><div><div class="cs-val">${money(price)}</div><div class="cs-label">建议售价</div></div><div><div class="cs-val">${pct(margin)}</div><div class="cs-label">毛利率</div></div></div>`}
function saveCostRecipe(sid){const name=document.getElementById('c-name')?.value||'未命名';const waste=(+document.getElementById('c-waste')?.value||10)/100;const labor=+document.getElementById('c-labor')?.value||25;const total=S.costRows.reduce((s,r)=>s+(r.qty||0)*(r.uc||0),0);const totalC=total*(1+waste)+labor*1.5;const per=totalC/(S.costServings||8);const price=per*(1+(S.costMarkup||200)/100);const margin=price>0?(price-per)/price*100:0;S.db.recipes[sid]=S.db.recipes[sid]||[];S.db.recipes[sid].push({id:uid(),name,servings:S.costServings,totalCost:totalC,price,margin,date:todayStr(),ingredients:[...S.costRows]});save();toast('✅ 已保存');navigate('cost')}
function loadCostRecipe(sid,rid){const r=S.db.recipes[sid]?.find(x=>x.id===rid);if(!r)return;S.costRows=r.ingredients.map(i=>({...i}));S.costServings=r.servings;navigate('cost');setTimeout(()=>{const el=document.getElementById('c-name');if(el)el.value=r.name},60)}
function clearCostRows(){S.costRows=[];navigate('cost')}

function renderAnalytics(){
  const ids=sids();
  let totalRev=0,totalCost=0;
  ids.forEach(sid=>(S.db.sales[sid]||[]).forEach(s=>{totalRev+=s.qty*s.price;totalCost+=s.qty*s.cost}));
  const totalLoss=ids.reduce((s,sid)=>s+(S.db.losses[sid]||[]).filter(l=>l.date>=daysAgo(30)).reduce((ss,l)=>ss+l.loss,0),0);
  const gm=totalRev>0?(totalRev-totalCost)/totalRev*100:0;
  return`
  <div class="page-hdr"><div><div class="page-title">📈 数据分析</div><div class="page-sub">${S.user.isAdmin?'全门店总览':'本店分析'} · 近30天</div></div></div>

    <div class="chart-card chart-full"><h3>🍞 近7天生产计划完成</h3><div class="chart-wrap" style="height:180px"><canvas id="c-prod"></canvas></div></div>
  </div>`;

const PALETTE=['#BF7235','#3E7D52','#2A5F9E','#B87020','#7B3A8E','#B83030','#5A8A7A','#8A6A3A','#3A7070'];
function initCharts(){
  if(typeof Chart==='undefined')return;
  const ids=sids();const allItems=ids.flatMap(sid=>inv(sid));const allSales=ids.flatMap(sid=>S.db.sales[sid]||[]);
  const catMap={};allItems.forEach(it=>{catMap[it.cat]=(catMap[it.cat]||0)+it.qty*it.uc});
  const catK=Object.keys(catMap).filter(k=>catMap[k]>0);
  tryChart('c-catpie','doughnut',{labels:catK,datasets:[{data:catK.map(k=>+catMap[k].toFixed(2)),backgroundColor:PALETTE,borderWidth:2,borderColor:'#FFFEFB'}]},{plugins:{legend:{position:'right',labels:{font:{size:10},padding:5}}}});
  const prodMap={};allSales.forEach(s=>{prodMap[s.productName]=(prodMap[s.productName]||0)+s.qty});
  const prodE=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  tryChart('c-prodbar','bar',{labels:prodE.map(e=>e[0]),datasets:[{label:'销量',data:prodE.map(e=>e[1]),backgroundColor:PALETTE[0],borderRadius:5}]},{plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}}}});
  if(S.user.isAdmin){const sR=SHOP_IDS.map(sid=>(S.db.sales[sid]||[]).reduce((s,x)=>s+x.qty*x.price,0));tryChart('c-stores','bar',{labels:SHOP_IDS.map(s=>st(s).name),datasets:[{label:'销售额',data:sR.map(v=>+v.toFixed(2)),backgroundColor:PALETTE,borderRadius:5}]},{plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}}}})}
  const days7=[];for(let i=6;i>=0;i--)days7.push(daysAgo(i));
  const dayRev=days7.map(d=>allSales.filter(s=>s.date===d).reduce((s,x)=>s+x.qty*x.price,0));
  tryChart('c-daily','line',{labels:days7,datasets:[{label:'销售额',data:dayRev.map(v=>+v.toFixed(2)),borderColor:PALETTE[0],backgroundColor:'rgba(191,114,53,.1)',fill:true,tension:.4}]},{plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}}}}});
  const lossMap={};ids.forEach(sid=>(S.db.losses[sid]||[]).filter(l=>l.date>=daysAgo(30)).forEach(l=>{lossMap[l.reason]=(lossMap[l.reason]||0)+l.loss}));
  const lossK=Object.keys(lossMap);
  tryChart('c-loss','bar',{labels:lossK,datasets:[{label:'报损金额',data:lossK.map(k=>+lossMap[k].toFixed(2)),backgroundColor:'rgba(184,48,48,.7)',borderRadius:5}]},{plugins:{legend:{display:false}}});
  const prodDays=[];for(let i=6;i>=0;i--)prodDays.push(daysAgo(i));
  const planned=prodDays.map(d=>ids.reduce((s,sid)=>s+(S.db.production[sid]||[]).filter(p=>p.date===d).reduce((ss,p)=>ss+p.planned,0),0));
  const actual=prodDays.map(d=>ids.reduce((s,sid)=>s+(S.db.production[sid]||[]).filter(p=>p.date===d).reduce((ss,p)=>ss+p.actual,0),0));
  tryChart('c-prod','bar',{labels:prodDays,datasets:[{label:'计划',data:planned,backgroundColor:'rgba(232,184,122,.7)',borderRadius:4},{label:'实际',data:actual,backgroundColor:PALETTE[1],borderRadius:4}]});
}

function renderRcpRows(){

function updRcpUnit(i){const r=S.__rcpRows[i];if(!r||!r.name)return;const it=BASE_INV.find(b=>b.name===r.name);const unit=it?.unit||inv(vsid()).find(x=>x.name===r.name)?.unit||'';const el=document.getElementById('rcp-unit-'+i);if(el)el.value=unit}

function resetOneStorePw(sid){
  const s=STORES.find(x=>x.id===sid);if(!s)return;
  const defaultPw=s.isAdmin?'admin123':'1234';
  const newPw=prompt(`重置「${s.name}」的密码\n\n留空 = 恢复默认密码 ${defaultPw}\n或输入新密码 (至少 4 位):`,defaultPw);
  if(newPw===null)return;
  const finalPw=(newPw||'').trim()||defaultPw;
  if(finalPw.length<4){toast('密码至少 4 位');return}
  s.pw=finalPw;S.db.stores=STORES;save();
  if(s.id===S.user.id)S.user.pw=finalPw;
  toast(`✅ 「${s.name}」密码已重置为:${finalPw}`);
  navigate('stores');
}
function resetAllPasswords(){
  if(!confirm('🔑 重置所有店铺密码?\n\n• 总部账号 → admin123\n• 门店账号 → 1234\n\n所有账号需要用新密码重新登录!'))return;
  if(!confirm('再次确认:这会影响所有店铺的登录,确定?'))return;
  let count=0;
  STORES.forEach(s=>{
    const newPw=s.isAdmin?'admin123':'1234';
    if(s.pw!==newPw){s.pw=newPw;count++}
  });
  S.db.stores=STORES;
  const me=STORES.find(s=>s.id===S.user.id);if(me)S.user.pw=me.pw;
  save();toast(`✅ 已重置 ${count} 个账号的密码`);navigate('stores');
}

function saveNewStore(){
  const id=v('st-id').trim().toLowerCase();const name=v('st-name').trim();
  if(!id||!/^[a-z0-9]+$/.test(id)){toast('ID 只能包含字母数字');return}
  if(STORES.find(s=>s.id===id)){toast('ID 已存在');return}
  if(!name){toast('请输入店名');return}
  const isAdmin=document.getElementById('st-admin').checked;
  const newStore={id,name,pw:v('st-pw')||'1234',initials:v('st-init')||name.slice(0,2),active:true};
  if(isAdmin)newStore.isAdmin=true;
  S.db.stores.push(newStore);STORES=S.db.stores;refreshShopIds();
  if(!isAdmin){['production','losses','orders','dailyClose','sales','recipes'].forEach(k=>S.db[k][id]=[]);S.db.inventory[id]=BASE_INV.map(it=>({id:uid(),name:it.name,cat:it.cat,unit:it.unit,qty:it.min*2|0,min:it.min,uc:it.uc,supplierId:S.db.suppliers[0]?.id||'',expiry:addDays(60),updated:todayStr()}))}
  save();closeModal();toast(`✅ 已新增「${name}」`);navigate('stores');
}
function showEditStore(sid){
  const s=STORES.find(x=>x.id===sid);if(!s)return;
  const adminCount=STORES.filter(x=>x.isAdmin&&x.active!==false).length;
  let roleToggle='';
  if(!s.isAdmin){
    roleToggle=`<div class="form-row"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0"><input type="checkbox" id="se-admin"> <span><strong>提升</strong>为总部管理账号（拥有所有权限）</span></label></div>`;
  }else if(s.id===S.user.id){
    roleToggle=`<div style="background:#fef0f0;border:1px solid #f5c2c2;border-radius:8px;padding:.65rem .85rem;font-size:.78rem;color:var(--bad);margin-bottom:.85rem;line-height:1.6">⚠️ 这是你<strong>当前登录</strong>的总部账号，不能在此降级自己。若要取消其管理员身份，请先登录另一个总部账号再操作。</div>`;
  }else if(adminCount<=1){
    roleToggle=`<div style="background:var(--bg);border-radius:8px;padding:.65rem .85rem;font-size:.78rem;color:var(--mu);margin-bottom:.85rem;line-height:1.6">ℹ️ 系统至少需要保留 1 个总部账号。如需取消此账号的管理员权限，请先新增另一个总部账号。</div>`;
  }else{
    roleToggle=`<div class="form-row"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0;background:#fff5e0;border:1px solid var(--lc);border-radius:8px;padding:8px 12px"><input type="checkbox" id="se-demote"> <span><strong>取消</strong>总部管理权限，降级为普通门店账号</span></label></div>`;
  }
  openModal(`<h2>✏️ 编辑门店：${s.name}</h2>
    <div class="form-row"><label class="form-label">门店ID</label><input class="form-ctrl" value="${s.id}" readonly style="color:var(--mu)"></div>
    <div class="form-row"><label class="form-label">门店名称</label><input id="se-name" class="form-ctrl" value="${s.name}"></div>
    <div class="form-2"><div class="form-row"><label class="form-label">登录密码</label><input id="se-pw" class="form-ctrl" value="${s.pw}"></div><div class="form-row"><label class="form-label">头像缩写</label><input id="se-init" class="form-ctrl" value="${s.initials||''}"></div></div>
    ${roleToggle}
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveEditStore('${sid}')">保存</button></div>`);
}
function saveEditStore(sid){
  const s=STORES.find(x=>x.id===sid);if(!s)return;
  const name=v('se-name').trim();if(!name){toast('请输入店名');return}
  s.name=name;s.pw=v('se-pw')||s.pw;s.initials=v('se-init')||s.initials;
  const adminCk=document.getElementById('se-admin');
  const demoteCk=document.getElementById('se-demote');
  let msg='✅ 已更新';
  if(adminCk&&adminCk.checked&&!s.isAdmin){
    s.isAdmin=true;msg='✅ 已提升为总部管理';
  }
  if(demoteCk&&demoteCk.checked&&s.isAdmin){
    const adminCount=STORES.filter(x=>x.isAdmin&&x.active!==false).length;
    if(adminCount<=1){toast('至少保留 1 个总部账号');return}
    if(s.id===S.user.id){toast('不能降级自己当前的账号');return}
    delete s.isAdmin;
    // 降级后初始化门店数据（如果还没有）
    ['production','losses','orders','dailyClose','sales','recipes'].forEach(k=>{if(!S.db[k][s.id])S.db[k][s.id]=[]});
    if(!S.db.inventory[s.id]||!S.db.inventory[s.id].length){
      S.db.inventory[s.id]=BASE_INV.map(it=>({id:uid(),name:it.name,cat:it.cat,unit:it.unit,qty:it.min*2|0,min:it.min,uc:it.uc,supplierId:S.db.suppliers[0]?.id||'',expiry:addDays(60),updated:todayStr()}));
    }
    msg='✅ 已降级为普通门店，并初始化门店数据';
  }
  S.db.stores=STORES;refreshShopIds();save();closeModal();
  if(s.id===S.user.id){S.user=s;document.getElementById('tb-store').textContent=s.name;document.getElementById('tb-avatar').textContent=s.initials}
  toast(msg);navigate('stores');
}
function toggleStoreActive(sid){
  const s=STORES.find(x=>x.id===sid);if(!s)return;
  if(s.isAdmin&&s.active!==false&&STORES.filter(x=>x.isAdmin&&x.active!==false).length<=1){toast('至少保留一个启用的管理账号');return}
  s.active=s.active===false;S.db.stores=STORES;refreshShopIds();save();toast(s.active!==false?'✅ 已启用':'已禁用');navigate('stores');
}
function delStore(sid){
  if(!confirm('⚠️ 确认删除？该门店所有数据(库存/销售/订单/生产/报损/日结)将永久清除！'))return;
  if(!confirm('再次确认：此操作不可恢复！'))return;
  S.db.stores=S.db.stores.filter(s=>s.id!==sid);STORES=S.db.stores;refreshShopIds();
  ['production','losses','orders','dailyClose','sales','recipes','inventory'].forEach(k=>{if(S.db[k])delete S.db[k][sid]});
  S.db.purchases=S.db.purchases.filter(p=>p.storeId!==sid);
  S.db.transfers=S.db.transfers.filter(t=>t.from!==sid&&t.to!==sid);
  save();toast('🗑 已删除');navigate('stores');
}

async function cloudConfigSave(){
  const url=v('cf-url').trim();
  const key=v('cf-key').trim();
  if(!url||!key){
    if(!confirm('URL 或 KEY 为空,这会切换到本地模式（不联网）。继续吗?'))return;
    localStorage.removeItem('bk_sb_url');localStorage.removeItem('bk_sb_key');
    toast('已切换为本地模式,正在刷新...');setTimeout(()=>location.reload(),900);return;
  }
  if(!url.startsWith('https://')||!url.includes('.supabase.co')){toast('URL 格式错误,应为 https://xxx.supabase.co');return}
  if(key.length<50){toast('Key 太短了,应该是很长的一串');return}
  // 测试连接
  toast('⟳ 测试连接中...');
  try{
    const testClient=window.supabase.createClient(url,key);
    const{error}=await testClient.from('bakery_data').select('id').limit(1);
    if(error){toast('❌ 连接失败: '+error.message);return}
  }catch(e){toast('❌ 连接异常: '+e.message);return}
  localStorage.setItem('bk_sb_url',url);
  localStorage.setItem('bk_sb_key',key);
  toast('✅ 配置已保存,正在刷新...');setTimeout(()=>location.reload(),900);
}
function cloudReset(){
  if(!confirm('确认恢复演示配置?你的私有库连接信息会被清除(但云端数据仍在那里)'))return;
  localStorage.removeItem('bk_sb_url');localStorage.removeItem('bk_sb_key');

}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='application/json,.json';
  inp.onchange=e=>{const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();reader.onload=ev=>{
      try{const data=JSON.parse(ev.target.result);
        if(!data.stores||!data.inventory){toast('文件格式无效');return}
        if(!confirm('确认导入？当前所有数据将被覆盖!'))return;
        S.db=data;STORES=data.stores;refreshShopIds();save();
        toast('✅ 数据已导入');navigate('dashboard');
      }catch(e){toast('解析失败：'+e.message)}
    };reader.readAsText(file);
  };inp.click();
}

    orders:document.getElementById('clr-orders').checked,
    production:document.getElementById('clr-production').checked,
    losses:document.getElementById('clr-losses').checked,
    dailyClose:document.getElementById('clr-dailyclose').checked,
    purchases:document.getElementById('clr-purchases').checked,
    transfers:document.getElementById('clr-transfers').checked,
    inventoryReset:document.getElementById('clr-inventory').checked,
    inventoryDel:document.getElementById('clr-inventory-all').checked
  };
  const selected=Object.entries(opts).filter(([k,v])=>v).map(([k])=>k);
  if(!selected.length){toast('请至少选择一项');return}
  if(!confirm(`确认清空 ${selected.length} 项数据?此操作不可恢复!`))return;
  if(!confirm('再次确认:你已备份了吗?如果没有,点取消并先去备份!'))return;
  
  const sids=S.user.isAdmin?SHOP_IDS:[S.user.id];
  let totalCleared=0;
  
  if(opts.sales){sids.forEach(sid=>{if(S.db.sales[sid]){totalCleared+=S.db.sales[sid].length;S.db.sales[sid]=[]}})}
  if(opts.orders){sids.forEach(sid=>{if(S.db.orders[sid]){totalCleared+=S.db.orders[sid].length;S.db.orders[sid]=[]}})}
  if(opts.production){sids.forEach(sid=>{if(S.db.production[sid]){totalCleared+=S.db.production[sid].length;S.db.production[sid]=[]}})}
  if(opts.losses){sids.forEach(sid=>{if(S.db.losses[sid]){totalCleared+=S.db.losses[sid].length;S.db.losses[sid]=[]}})}
  if(opts.dailyClose){sids.forEach(sid=>{if(S.db.dailyClose[sid]){totalCleared+=S.db.dailyClose[sid].length;S.db.dailyClose[sid]=[]}})}
  if(opts.purchases){
    if(S.user.isAdmin){totalCleared+=S.db.purchases.length;S.db.purchases=[]}
    else{const before=S.db.purchases.length;S.db.purchases=S.db.purchases.filter(p=>p.storeId!==S.user.id);totalCleared+=(before-S.db.purchases.length)}
  }
  if(opts.transfers){
    if(S.user.isAdmin){totalCleared+=S.db.transfers.length;S.db.transfers=[]}
    else{const before=S.db.transfers.length;S.db.transfers=S.db.transfers.filter(t=>t.from!==S.user.id&&t.to!==S.user.id);totalCleared+=(before-S.db.transfers.length)}
  }
  if(opts.inventoryReset){sids.forEach(sid=>{(S.db.inventory[sid]||[]).forEach(it=>{totalCleared++;it.qty=0;it.updated=todayStr()})})}
  if(opts.inventoryDel){sids.forEach(sid=>{if(S.db.inventory[sid]){totalCleared+=S.db.inventory[sid].length;S.db.inventory[sid]=[]}})}
  
  save();closeModal();toast(`✅ 已清空 ${totalCleared} 项数据`);navigate('dashboard');
}
async function resetAllData(){
  if(!confirm('⚠️ 确认完全重置?\n\n这会清空:\n• 所有销售/订单/库存/生产/报损/日结/采购/调拨记录\n• 店铺账号(恢复成默认 5 个)\n• 产品配方(恢复成默认)\n\n本地+云端都会清空,所有设备都受影响!'))return;
  if(!confirm('再次确认:数据无法恢复!如果没备份请点取消!'))return;
  if(!confirm('最后一次确认:真的要清空一切吗?'))return;
  localStorage.removeItem('bk_db');
  // 同时清空云端
  // 注释掉清空云端的逻辑,避免误删数据
  // 如需清空云端,请直接在 Supabase 后台手动操作
  S.db=seedAll();STORES=S.db.stores;refreshShopIds();
  save();toast('✅ 已完全重置,请重新登录');setTimeout(doLogout,1500);
}


function openModal(html,size=''){document.getElementById('mbox').className='modal-box'+(size?' '+size:'');document.getElementById('mbox').innerHTML=html;document.getElementById('mov').classList.add('open')}
function closeModal(){document.getElementById('mov').classList.remove('open')}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>t.classList.remove('show'),2600)}

function toggleAI(){document.getElementById('ai-win').classList.toggle('open')}
function aiQuick(q){document.getElementById('ai-input').value=q;aiSend()}
function aiQuickCtx(){const ctxMap={dashboard:'帮我看看仪表盘数据，给出经营建议',inventory:'分析当前库存，哪些需要优先补货？',production:'今天该生产哪些产品？参考最近销量',loss:'分析报损原因，怎么减少损耗？',sales:'分析销售数据和畅销产品',orders:'分析客户预订情况',dailyclose:'分析日结对账数据',analytics:'整体经营分析和建议'};aiQuick(ctxMap[S.page]||'分析当前页面数据')}
async function aiSend(){
  const inp=document.getElementById('ai-input');const q=inp.value.trim();if(!q)return;
  const msgs=document.getElementById('ai-msgs');
  const userMsg=document.createElement('div');userMsg.className='ai-msg user';userMsg.textContent=q;msgs.appendChild(userMsg);
  inp.value='';msgs.scrollTop=msgs.scrollHeight;
  const loading=document.createElement('div');loading.className='ai-msg bot loading';loading.textContent='思考中...';msgs.appendChild(loading);msgs.scrollTop=msgs.scrollHeight;
  // Build context
  const ids=sids();const today=todayStr();
  const ctx={
    user:S.user.isAdmin?'总部管理员':S.user.name,
    page:S.page,
    todaySales:ids.reduce((s,sid)=>s+(S.db.sales[sid]||[]).filter(x=>x.date===today).reduce((ss,x)=>ss+x.qty*x.price,0),0),
    lowStock:ids.flatMap(sid=>inv(sid).filter(it=>it.qty<it.min).map(it=>`${st(sid).name}${it.name}(${it.qty}/${it.min}${it.unit})`)).slice(0,8),
    todayLoss:ids.reduce((s,sid)=>s+(S.db.losses[sid]||[]).filter(l=>l.date===today).reduce((ss,l)=>ss+l.loss,0),0),
    pendingOrders:ids.reduce((s,sid)=>s+(S.db.orders[sid]||[]).filter(o=>o.status==='待确认').length,0),
    top7Sales:Object.entries(ids.flatMap(sid=>(S.db.sales[sid]||[]).filter(s=>s.date>=daysAgo(7))).reduce((acc,s)=>{acc[s.productName]=(acc[s.productName]||0)+s.qty;return acc},{})).sort((a,b)=>b[1]-a[1]).slice(0,5)
  };
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:`你是赛耶司烘焙连锁的AI经营助手。用中文简洁回答(200字内)。当前数据：用户=${ctx.user}, 当前页=${ctx.page}, 今日销售=¥${ctx.todaySales.toFixed(0)}, 今日报损=¥${ctx.todayLoss.toFixed(0)}, 待确认订单=${ctx.pendingOrders}, 低库存=${ctx.lowStock.join('、')||'无'}, 近7天畅销Top5=${ctx.top7Sales.map(([n,q])=>`${n}(${q}件)`).join('、')}。给出具体可操作的建议。`,messages:[...S.aiHist.slice(-4),{role:'user',content:q}]})});
    const data=await resp.json();const reply=data.content?.[0]?.text||'抱歉，没有收到回复';
    loading.remove();
    const botMsg=document.createElement('div');botMsg.className='ai-msg bot';botMsg.textContent=reply;msgs.appendChild(botMsg);msgs.scrollTop=msgs.scrollHeight;
    S.aiHist.push({role:'user',content:q},{role:'assistant',content:reply});
  }catch(e){loading.remove();const errMsg=document.createElement('div');errMsg.className='ai-msg bot';errMsg.textContent='网络异常或API暂时不可用，请稍后再试 🙏';msgs.appendChild(errMsg);msgs.scrollTop=msgs.scrollHeight}
}

// ===== PWA: Service Worker 注册 + 安装提示 =====
let _deferredInstall=null;
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      console.log('✅ Service Worker registered:',reg.scope);
    }).catch(err=>{
      console.log('⚠️ Service Worker registration failed:',err);
    });
  });
}
// 捕获浏览器的"安装到桌面"事件
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  _deferredInstall=e;
  // 显示自定义安装按钮
  setTimeout(()=>{
    const btn=document.getElementById('pwa-install-btn');
    if(btn)btn.style.display='inline-flex';
  },1500);
});
window.addEventListener('appinstalled',()=>{
  _deferredInstall=null;
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='none';
  toast('🎉 已添加到主屏幕!');
});
async function pwaInstall(){
  if(!_deferredInstall){
    // iOS 用户没有 beforeinstallprompt
    if(/iPhone|iPad|iPod/.test(navigator.userAgent)){
      alert('iPhone/iPad 添加方法:\n1. 点底部 Safari 分享按钮 ⬆️\n2. 选择"添加到主屏幕"\n3. 给应用起名,完成');
    }else{
      alert('请在浏览器菜单中选择"安装应用"或"添加到主屏幕"');
    }
    return;
  }
  _deferredInstall.prompt();
  const{outcome}=await _deferredInstall.userChoice;
  if(outcome==='accepted')toast('🎉 安装中...');
  _deferredInstall=null;
}
